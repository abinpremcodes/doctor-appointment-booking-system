<!DOCTYPE html>
<html>
<head>
    <title>CarePoint</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
            font-family: 'Segoe UI', sans-serif;
        }

        .navbar-custom {
            background-color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .brand {
            font-weight: 600;
            font-size: 20px;
            color: #2c3e50;
        }

        .btn-primary-custom {
    background-color: #2a5298;
    color:white;
    border: none;
    border-radius: 8px;
    padding: 10px;
}

.btn-primary-custom:hover {
    background-color: #1e3c72;
}

        .card-custom {
         background-color: #ffffff;
         border-radius: 12px;
         box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }

        .table-custom {
            background: white;
            border-radius: 12px;
            overflow: hidden;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="brand text-decoration-none" href="/">CarePoint</a>

    <div class="ms-auto">
        {% if user.is_authenticated %}
            <span class="me-3 text-muted">Hi, {{ user.username }}</span>
            <a href="/dashboard/" class="me-3 text-decoration-none text-dark">Dashboard</a>

            {% if user.role == "patient" %}
                <a href="/book/" class="me-3 text-decoration-none text-dark">Book</a>
            {% endif %}
            {% if user.is_superuser %}
            <a href="/admin/" class="me-3 text-decoration-none text-primary">Admin Panel</a>
            {% endif %}

           <form method="POST" action="/accounts/logout/" style="display:inline;">
    {% csrf_token %}
    <button type="submit" class="btn btn-link text-danger p-0">
        Logout
    </button>
</form>
        {% else %}
            <a href="/register/" class="me-3 text-decoration-none text-dark">Register</a>
            <a href="/accounts/login/" class="text-decoration-none text-dark">Login</a>
        {% endif %}
    </div>
</nav>

<div class="container mt-5">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
