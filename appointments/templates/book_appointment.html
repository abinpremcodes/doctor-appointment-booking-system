{% extends "base.html" %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card card-custom p-4">
            <h4 class="mb-4">Book Appointment</h4>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}

                <button type="submit" class="btn btn-primary-custom w-100 mt-3">
                    Confirm Appointment
                </button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
